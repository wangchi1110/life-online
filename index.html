<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>人生Online</title>
<style>
    /* 質感深色主題 (Elegant Dark Mode) */
    body { background-color: #111827; color: #D1D5DB; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 15px; margin: 0; font-size: 14px; line-height: 1.5; }
    .panel { background-color: #1F2937; border: 1px solid #374151; border-radius: 16px; padding: 16px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); position: relative; }
    h2 { color: #9CA3AF; font-size: 13px; margin-top: 0; border-bottom: 1px solid #374151; padding-bottom: 8px; text-transform: uppercase; letter-spacing: 1.5px; display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
    
    .status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 14px; }
    .highlight-text { color: #F3F4F6; font-weight: 600; }
    .tier-text { color: #FBBF24; font-weight: 600; }
    
    .bar-bg { background-color: #374151; height: 8px; width: 100%; margin: 6px 0 12px 0; border-radius: 9999px; overflow: hidden; }
    .bar-fill { height: 100%; width: 0%; transition: width 0.4s ease; }
    .bar-exp { background-color: #10B981; }
    .bar-hp { background-color: #EF4444; }
    .bar-mp { background-color: #3B82F6; }

    /* 頭像區域 */
    .avatar-container { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    .avatar-wrapper { position: relative; }
    .avatar-img { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; border: 2px solid #4B5563; background-color: #374151; }
    .avatar-upload-btn { position: absolute; bottom: 0; right: 0; background: #10B981; color: white; width: 22px; height: 22px; border-radius: 50%; text-align: center; line-height: 20px; cursor: pointer; font-size: 16px; font-weight: bold; border: 2px solid #1F2937; }

    /* HP/MP 控制按鈕 */
    .res-controls { display: flex; gap: 4px; }
    .res-btn { background: #374151; border: none; color: #D1D5DB; border-radius: 4px; padding: 2px 8px; font-size: 12px; cursor: pointer; }
    .res-btn:active { background: #4B5563; }

    /* 屬性方塊 */
    .attr-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 12px; }
    .attr-item { background-color: #111827; padding: 12px; border-radius: 8px; border-left: 4px solid #3B82F6; }
    .attr-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px;}
    .attr-name { font-size: 14px; color: #9CA3AF; font-weight: 600;}
    .attr-val { font-size: 15px; color: #F3F4F6; font-weight: 700; font-family: monospace; }

    /* 7大素質 */
    .quality-row { display: flex; justify-content: space-between; align-items: center; background-color: #111827; padding: 8px 12px; margin-bottom: 8px; border-radius: 8px; }
    .quality-name { font-size: 13px; color: #D1D5DB; width: 80px;}
    .quality-controls { display: flex; align-items: center; gap: 12px; }
    .q-btn { background: #374151; color: #F3F4F6; border: none; border-radius: 4px; width: 24px; height: 24px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .q-btn:active { background: #4B5563; }
    .q-val { font-size: 14px; color: #F3F4F6; font-weight: bold; width: 24px; text-align: center; font-family: monospace; }

    /* 標籤 (天賦/個性) */
    .tag-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .item-tag { background-color: #374151; color: #E5E7EB; padding: 6px 12px; border-radius: 9999px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
    .del-tag-btn { background: transparent; border: none; color: #EF4444; cursor: pointer; font-size: 12px; padding: 0; display: flex; align-items: center; }

    /* 技能 (保留進度條) */
    .skill-section { margin-top: 12px; }
    .custom-item-header { display: flex; justify-content: space-between; align-items: center; margin-top: 8px;}
    .skill-name { color: #E5E7EB; font-size: 13px; font-weight: 600; }
    .cs-btn { background: transparent; border: 1px solid #EF4444; color: #EF4444; padding: 2px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }

    /* 動作按鈕 */
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
    .action-btn { background-color: #374151; color: #F3F4F6; border: 1px solid transparent; padding: 12px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.2s; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; position: relative;}
    .action-btn:active { background-color: #4B5563; }
    .action-val { font-size: 11px; color: #9CA3AF; }
    .del-act-btn { position: absolute; top: 4px; right: 4px; background: transparent; border: none; color: #EF4444; font-size: 12px; cursor: pointer; padding: 4px; }
    
    .edit-btn { background-color: #374151; color: #D1D5DB; border: none; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: 600; }

    .log-box { font-size: 11px; color: #9CA3AF; height: 100px; overflow-y: auto; background-color: #111827; padding: 10px; border-radius: 8px; font-family: monospace; line-height: 1.6; }
    
    #notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #10B981; color: #FFF; padding: 12px 24px; border-radius: 8px; font-weight: bold; display: none; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; }
    .modal-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1F2937; border: 1px solid #374151; padding: 24px; width: 85%; max-width: 320px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    .modal-box label { font-size: 12px; color: #9CA3AF; }
    .modal-box input, .modal-box select { width: 100%; box-sizing: border-box; background: #111827; border: 1px solid #374151; color: #F3F4F6; padding: 10px; margin-top: 6px; margin-bottom: 16px; border-radius: 6px; font-family: inherit; }
</style>
</head>
<body>
    <div id="notification">系統更新</div>

    <div id="modal-config" class="modal-overlay">
        <div class="modal-box">
            <h2 style="border:none; margin-bottom: 10px;">系統參數設定</h2>
            <label>職業/身分：</label>
            <input type="text" id="input-job" placeholder="例如：學生、工程師">
            <label>流動資產 (HKD)：</label>
            <input type="number" id="input-cash" placeholder="輸入數字">
            <div style="display: flex; gap: 10px;">
                <button class="action-btn" style="flex: 1; background: #10B981; color: #FFF;" onclick="window.saveConfig()">儲存</button>
                <button class="action-btn" style="flex: 1; border: 1px solid #EF4444; color: #EF4444;" onclick="window.closeModal('modal-config')">取消</button>
            </div>
        </div>
    </div>

    <div id="modal-action" class="modal-overlay">
        <div class="modal-box">
            <h2 style="border:none; margin-bottom: 10px;">新增自訂動作</h2>
            <label>按鈕名稱：</label>
            <input type="text" id="act-name" placeholder="例如：冥想、寫程式">
            <label>對應提升目標：</label>
            <select id="act-target"></select>
            <label>每次提升數值 (建議 0.2 至 10)：</label>
            <input type="number" id="act-val" step="0.1" value="0.2">
            <div style="display: flex; gap: 10px;">
                <button class="action-btn" style="flex: 1; background: #3B82F6; color: #FFF;" onclick="window.saveCustomAction()">新增</button>
                <button class="action-btn" style="flex: 1; border: 1px solid #EF4444; color: #EF4444;" onclick="window.closeModal('modal-action')">取消</button>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="avatar-container">
            <div class="avatar-wrapper">
                <img id="ui-avatar" class="avatar-img" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzlDQTNBRiI+PHBhdGggZD0iTTEyIDJDNi40OCAyIDIgNi40OCAyIDEyczQuNDggMTAgMTAgMTAgMTAtNC40OCAxMC0xMFMxNy41MiAyIDEyIDJ6bTAgM2MxLjY2IDAgMyAxLjM0IDMgM3MtMS4zNCAzLTMgMy0zLTEuMzQtMy0zIDEuMzQtMyAzLTN6bTAgMTQuMmMtMi41IDAtNC43MS0xLjI4LTYtMy4yMi4wMy0xLjk5IDQtMy4wOCA2LTMuMDhzNS45NyAxLjA5IDYgMy4wOGMtMS4yOSAxLjk0LTMuNSAzLjIyLTYgMy4yMnoiLz48L3N2Zz4=">
                <label for="avatar-upload" class="avatar-upload-btn">+</label>
                <input type="file" id="avatar-upload" accept="image/*" style="display: none;" onchange="window.handleAvatarUpload(event)">
            </div>
            <div style="flex: 1;">
                <div class="status-row" style="margin-bottom: 4px;"><span><span id="p-job" class="highlight-text" style="font-size: 16px;">載入中...</span></span></div>
                <div class="status-row" style="margin-bottom: 0;"><span>等級: <span id="p-lv" class="highlight-text">1</span> <span id="p-tier" class="tier-text"></span></span></div>
            </div>
            <button class="edit-btn" onclick="window.openModal('modal-config')">設定</button>
        </div>
        
        <div class="bar-bg"><div id="p-exp" class="bar-fill bar-exp"></div></div>
        
        <div class="status-row" style="margin-top: 16px;">
            <span>HP: <span id="v-hp" class="highlight-text">100</span>/<span id="v-maxhp">100</span></span>
            <div class="res-controls">
                <button class="res-btn" onclick="window.adjRes('hp', -10)">-10</button>
                <button class="res-btn" onclick="window.adjRes('hp', 10)">+10</button>
                <button class="res-btn" onclick="window.adjRes('hp', 999)">滿</button>
            </div>
        </div>
        <div class="bar-bg"><div class="bar-fill bar-hp" id="bar-hp" style="width: 100%"></div></div>

        <div class="status-row">
            <span>MP: <span id="v-mp" class="highlight-text">100</span>/<span id="v-maxmp">100</span></span>
            <div class="res-controls">
                <button class="res-btn" onclick="window.adjRes('mp', -10)">-10</button>
                <button class="res-btn" onclick="window.adjRes('mp', 10)">+10</button>
                <button class="res-btn" onclick="window.adjRes('mp', 999)">滿</button>
            </div>
        </div>
        <div class="bar-bg"><div class="bar-fill bar-mp" id="bar-mp" style="width: 100%"></div></div>

        <div class="status-row" style="margin-top: 12px;"><span>CASH: <span class="highlight-text">HKD <span id="v-cash">0</span></span></span></div>
    </div>

    <div class="panel">
        <h2>ATTRIBUTES (核心素質)</h2>
        <div class="attr-grid">
            <div class="attr-item" id="ui-STR">
                <div class="attr-header"><span class="attr-name">力量 (STR)</span><span class="attr-val"><span id="v-str">0</span> / 100</span></div>
                <div class="bar-bg" style="margin:0;"><div class="bar-fill" id="bar-str" style="background-color: #3B82F6; width:0%"></div></div>
            </div>
            <div class="attr-item" id="ui-VIT">
                <div class="attr-header"><span class="attr-name">體質 (VIT)</span><span class="attr-val"><span id="v-vit">0</span> / 100</span></div>
                <div class="bar-bg" style="margin:0;"><div class="bar-fill" id="bar-vit" style="background-color: #3B82F6; width:0%"></div></div>
            </div>
            <div class="attr-item" id="ui-AGI">
                <div class="attr-header"><span class="attr-name">敏捷 (AGI)</span><span class="attr-val"><span id="v-agi">0</span> / 100</span></div>
                <div class="bar-bg" style="margin:0;"><div class="bar-fill" id="bar-agi" style="background-color: #3B82F6; width:0%"></div></div>
            </div>
            <div class="attr-item" id="ui-INT">
                <div class="attr-header"><span class="attr-name">智力 (INT)</span><span class="attr-val"><span id="v-int">0</span> / 100</span></div>
                <div class="bar-bg" style="margin:0;"><div class="bar-fill" id="bar-int" style="background-color: #3B82F6; width:0%"></div></div>
            </div>
        </div>
    </div>

    <div class="panel">
        <h2>PERSONALITY (個性) <button class="edit-btn" onclick="window.promptAddItem('personality')">+ 新增</button></h2>
        <div class="tag-container" id="personality-container"></div>
    </div>

    <div class="panel">
        <h2>TALENTS (天賦) <button class="edit-btn" onclick="window.promptAddItem('talent')">+ 新增</button></h2>
        <div class="tag-container" id="talents-container"></div>
    </div>

    <div class="panel">
        <h2>CORE QUALITIES (7大素質)</h2>
        <div id="qualities-container" style="margin-top: 12px;"></div>
    </div>

    <div class="panel">
        <h2>SKILLS (技能) <button class="edit-btn" onclick="window.promptAddItem('skill')">+ 新增</button></h2>
        <div class="skill-section" id="skills-container"></div>
    </div>

    <div class="panel">
        <h2>ACTION CONSOLE <button class="edit-btn" onclick="window.openActionModal()">+ 自訂動作</button></h2>
        <div class="btn-grid" id="actions-container"></div>
    </div>

    <div class="panel">
        <h2>SYSTEM LOG</h2>
        <div class="log-box" id="sys-log"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgwyo2bWYjFAuX4zPg1LNpgbGQqDDOmnI",
            authDomain: "life-online-dac47.firebaseapp.com",
            projectId: "life-online-dac47",
            storageBucket: "life-online-dac47.firebasestorage.app",
            messagingSenderId: "1007736463039",
            appId: "1:1007736463039:web:64fb96caa559a3c7bb300a"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const dbPath = ref(database, 'saveData/mainProfile');

        const EXP_REQ = 100;
        const qNames = { action: '行動力', willpower: '意志力', learning: '學習力', thinking: '思考力', emotion: '情緒控制力', communication: '溝通能力', insight: '洞察力' };
        const attrNames = { STR: '力量', VIT: '體質', AGI: '敏捷', INT: '智力' };
        
        let db = {
            player: { lv: 1, exp: 0, cash: 0, job: '未設定', avatar: '' },
            res: { hp: 100, mp: 100 },
            attr: {
                STR: { pts: 0, last: Date.now() },
                VIT: { pts: 0, last: Date.now() },
                AGI: { pts: 0, last: Date.now() },
                INT: { pts: 0, last: Date.now() }
            },
            qualities: { action: 0, willpower: 0, learning: 0, thinking: 0, emotion: 0, communication: 0, insight: 0 },
            talents: {},
            personalities: {},
            customSkills: {},
            customActions: {},
            logs: ["系統連線中..."]
        };

        async function init() {
            try {
                const snapshot = await get(dbPath);
                if (snapshot.exists()) {
                    let cloudData = snapshot.val();
                    if(!cloudData.qualities) cloudData.qualities = { action: 0, willpower: 0, learning: 0, thinking: 0, emotion: 0, communication: 0, insight: 0 };
                    if(!cloudData.talents) cloudData.talents = {};
                    if(!cloudData.personalities) cloudData.personalities = {};
                    if(!cloudData.customSkills) cloudData.customSkills = {};
                    if(!cloudData.customActions) cloudData.customActions = {};
                    if(!cloudData.res) cloudData.res = { hp: 100, mp: 100 };
                    db = cloudData;
                    addLog("已載入雲端存檔。");
                } else {
                    addLog("建立全新雲端存檔。");
                    db.customActions = {
                        'act_1': { name: '做Gym', targetType: 'attr', targetId: 'STR', val: 0.2 },
                        'act_2': { name: '做帶氧操練', targetType: 'attr', targetId: 'VIT', val: 0.2 },
                        'act_3': { name: '跑步', targetType: 'attr', targetId: 'AGI', val: 0.2 },
                        'act_4': { name: '睇書學習', targetType: 'attr', targetId: 'INT', val: 0.2 }
                    };
                    save();
                }
                updateUI();
            } catch (error) {
                addLog("資料庫連線失敗，請檢查網路。");
                updateUI();
            }
        }

        // 頭像上傳邏輯 (自動壓縮)
        window.handleAvatarUpload = function(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 150;
                    let w = img.width; let h = img.height;
                    if (w > h) { if (w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; } }
                    else { if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; } }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    db.player.avatar = canvas.toDataURL('image/jpeg', 0.8);
                    save(); updateUI(); showFX("更新頭像");
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        // 資源手動調整
        window.adjRes = function(type, val) {
            let maxHp = 100 + Math.floor(db.attr.VIT.pts);
            let maxMp = 100 + Math.floor(db.attr.INT.pts);
            
            if(type === 'hp') {
                db.res.hp += val;
                if(db.res.hp > maxHp) db.res.hp = maxHp;
                if(db.res.hp < 0) db.res.hp = 0;
            } else {
                db.res.mp += val;
                if(db.res.mp > maxMp) db.res.mp = maxMp;
                if(db.res.mp < 0) db.res.mp = 0;
            }
            save(); updateUI();
        }

        window.openModal = function(id) {
            if(id === 'modal-config') {
                document.getElementById('input-job').value = db.player.job !== '未設定' ? db.player.job : '';
                document.getElementById('input-cash').value = db.player.cash;
            }
            document.getElementById(id).style.display = 'block';
        }

        window.closeModal = function(id) { document.getElementById(id).style.display = 'none'; }

        window.saveConfig = function() {
            db.player.job = document.getElementById('input-job').value || '未設定';
            db.player.cash = parseInt(document.getElementById('input-cash').value) || 0;
            addLog("系統參數已儲存。");
            save(); updateUI(); closeModal('modal-config'); showFX("已儲存");
        }

        window.openActionModal = function() {
            let select = document.getElementById('act-target');
            let options = '';
            for(let key in attrNames) { options += `<option value="attr_${key}">素質: ${attrNames[key]}</option>`; }
            for(let id in db.customSkills) { options += `<option value="skill_${id}">技能: ${db.customSkills[id].name}</option>`; }
            select.innerHTML = options;
            
            document.getElementById('act-name').value = '';
            document.getElementById('modal-action').style.display = 'block';
        }

        window.saveCustomAction = function() {
            let name = document.getElementById('act-name').value.trim();
            let targetRaw = document.getElementById('act-target').value;
            let val = parseFloat(document.getElementById('act-val').value);
            
            if(!name || !targetRaw || isNaN(val)) return alert("請填寫完整資訊");
            
            let parts = targetRaw.split('_');
            let type = parts[0];
            let targetId = parts.slice(1).join('_'); 
            
            let id = 'act_' + Date.now();
            db.customActions[id] = { name: name, targetType: type, targetId: targetId, val: val };
            addLog(`新增動作指令：【${name}】`);
            save(); updateUI(); closeModal('modal-action'); showFX("動作已新增");
        }

        window.deleteAction = function(id, name, event) {
            event.stopPropagation();
            if(confirm(`確認刪除動作【${name}】？`)) {
                delete db.customActions[id];
                save(); updateUI();
            }
        }

        window.changeQuality = function(key, delta) {
            let val = db.qualities[key] || 0;
            val += delta;
            if(val < 0) val = 0; if(val > 10) val = 10;
            db.qualities[key] = val;
            save(); updateUI();
        }

        window.promptAddItem = function(type) {
            let label = type === 'talent' ? '天賦' : (type === 'personality' ? '個性' : '技能');
            let name = prompt(`請輸入新${label}名稱：`);
            if(name && name.trim() !== "") {
                let id = type + '_' + Date.now();
                let targetDb = type === 'talent' ? db.talents : (type === 'personality' ? db.personalities : db.customSkills);
                targetDb[id] = { name: name.trim(), pts: 0 };
                addLog(`新增${label}：【${name}】`);
                save(); updateUI(); showFX("已新增");
            }
        }

        window.deleteItem = function(type, id) {
            let label = type === 'talent' ? '天賦' : (type === 'personality' ? '個性' : '技能');
            let targetDb = type === 'talent' ? db.talents : (type === 'personality' ? db.personalities : db.customSkills);
            if(confirm(`確認刪除${label}【${targetDb[id].name}】？`)) {
                delete targetDb[id];
                save(); updateUI();
            }
        }

        window.executeAction = function(actionId) {
            let act = db.customActions[actionId];
            if(!act) return;

            let targetName = ""; let targetPts = 0;

            if(act.targetType === 'attr') {
                db.attr[act.targetId].pts += act.val;
                db.attr[act.targetId].pts = parseFloat(db.attr[act.targetId].pts.toFixed(1)); 
                if(db.attr[act.targetId].pts > 100) db.attr[act.targetId].pts = 100;
                targetName = attrNames[act.targetId]; targetPts = db.attr[act.targetId].pts;
            } else if (act.targetType === 'skill') {
                if(!db.customSkills[act.targetId]) return alert("目標技能已不存在");
                db.customSkills[act.targetId].pts += act.val;
                db.customSkills[act.targetId].pts = parseFloat(db.customSkills[act.targetId].pts.toFixed(1));
                if(db.customSkills[act.targetId].pts > 100) db.customSkills[act.targetId].pts = 100;
                targetName = db.customSkills[act.targetId].name; targetPts = db.customSkills[act.targetId].pts;
            }

            db.player.exp += Math.floor(act.val * 10);
            if(db.player.exp >= EXP_REQ) {
                db.player.exp -= EXP_REQ;
                db.player.lv += 1;
                showFX("RANK UP!");
            }

            addLog(`[行動] ${act.name}：${targetName} +${act.val}`);
            save(); updateUI();
        }

        function save() { 
            set(dbPath, db).catch((error) => { console.error(error); showFX("錯誤"); }); 
        }

        function getTier(lv) {
            if(lv <= 5) return "初心者"; if(lv <= 15) return "熟練者"; if(lv <= 30) return "專家"; return "大師";
        }

        function updateUI() {
            if(db.player.avatar) document.getElementById('ui-avatar').src = db.player.avatar;
            document.getElementById('p-job').innerText = db.player.job;
            document.getElementById('p-lv').innerText = db.player.lv;
            document.getElementById('p-tier').innerText = `(${getTier(db.player.lv)})`;
            document.getElementById('p-exp').style.width = (db.player.exp / EXP_REQ * 100) + '%';
            document.getElementById('v-cash').innerText = db.player.cash;

            let maxHp = 100 + Math.floor(db.attr.VIT.pts);
            let maxMp = 100 + Math.floor(db.attr.INT.pts);
            
            document.getElementById('v-hp').innerText = db.res.hp;
            document.getElementById('v-maxhp').innerText = maxHp;
            document.getElementById('bar-hp').style.width = (db.res.hp / maxHp * 100) + '%';
            
            document.getElementById('v-mp').innerText = db.res.mp;
            document.getElementById('v-maxmp').innerText = maxMp;
            document.getElementById('bar-mp').style.width = (db.res.mp / maxMp * 100) + '%';

            ['STR', 'VIT', 'AGI', 'INT'].forEach(stat => {
                let pts = db.attr[stat].pts || 0;
                document.getElementById(`v-${stat.toLowerCase()}`).innerText = pts;
                document.getElementById(`bar-${stat.toLowerCase()}`).style.width = pts + '%';
            });

            let qHtml = '';
            for(let key in qNames) {
                let val = db.qualities[key] || 0;
                qHtml += `
                <div class="quality-row">
                    <span class="quality-name">${qNames[key]}</span>
                    <div class="bar-bg" style="margin:0 10px; flex:1; height:6px;"><div class="bar-fill" style="background-color:#FBBF24; width:${val*10}%"></div></div>
                    <div class="quality-controls">
                        <button class="q-btn" onclick="window.changeQuality('${key}', -1)">-</button>
                        <span class="q-val">${val}</span>
                        <button class="q-btn" onclick="window.changeQuality('${key}', 1)">+</button>
                    </div>
                </div>`;
            }
            document.getElementById('qualities-container').innerHTML = qHtml;

            // 渲染個性 (標籤)
            let persHtml = '';
            for(let id in db.personalities) {
                persHtml += `<div class="item-tag">${db.personalities[id].name} <button class="del-tag-btn" onclick="window.deleteItem('personality', '${id}')">✖</button></div>`;
            }
            document.getElementById('personality-container').innerHTML = persHtml || '<div style="color:#6B7280; font-size:12px;">尚無資料</div>';

            // 渲染天賦 (標籤)
            let talentHtml = '';
            for(let id in db.talents) {
                talentHtml += `<div class="item-tag" style="border: 1px solid #10B981; color: #10B981; background: rgba(16, 185, 129, 0.1);">${db.talents[id].name} <button class="del-tag-btn" onclick="window.deleteItem('talent', '${id}')">✖</button></div>`;
            }
            document.getElementById('talents-container').innerHTML = talentHtml || '<div style="color:#6B7280; font-size:12px;">尚無資料</div>';

            // 渲染技能 (進度條)
            let skillHtml = '';
            for(let id in db.customSkills) {
                let s = db.customSkills[id];
                skillHtml += `
                <div style="margin-bottom: 12px;">
                    <div class="custom-item-header"><span class="skill-name">${s.name}</span>
                    <button class="cs-btn" onclick="window.deleteItem('skill', '${id}')">刪除</button></div>
                    <div class="bar-bg" style="margin-top:6px; height: 6px;"><div class="bar-fill bar-exp" style="width: ${s.pts}%"></div></div>
                    <div style="font-size:11px; text-align:right; color:#9CA3AF; font-family: monospace;">${s.pts} / 100</div>
                </div>`;
            }
            document.getElementById('skills-container').innerHTML = skillHtml || '<div style="color:#6B7280; font-size:12px;">尚無資料</div>';

            let actHtml = '';
            for(let id in db.customActions) {
                let act = db.customActions[id];
                let targetLabel = "";
                if(act.targetType === 'attr') targetLabel = attrNames[act.targetId] || act.targetId;
                if(act.targetType === 'skill' && db.customSkills[act.targetId]) targetLabel = db.customSkills[act.targetId].name;
                
                actHtml += `
                <button class="action-btn" onclick="window.executeAction('${id}')">
                    <span style="font-size:14px; font-weight:600; color:#F3F4F6;">${act.name}</span>
                    <span class="action-val">${targetLabel} +${act.val}</span>
                    <button class="del-act-btn" onclick="window.deleteAction('${id}', '${act.name}', event)">✖</button>
                </button>`;
            }
            document.getElementById('actions-container').innerHTML = actHtml || '<div style="color:#6B7280; font-size:12px; grid-column: span 2;">點擊右上角新增動作</div>';

            let logHtml = '';
            db.logs.forEach(l => { logHtml += `<div>${l}</div>`; });
            document.getElementById('sys-log').innerHTML = logHtml;
        }

        function addLog(msg) {
            let time = new Date().toLocaleTimeString('en-GB', {hour12: false});
            db.logs.unshift(`[${time}] ${msg}`);
            if(db.logs.length > 15) db.logs.pop();
        }

        function showFX(text) {
            let n = document.getElementById('notification');
            n.innerText = text; n.style.display = 'block';
            setTimeout(() => { n.style.display = 'none'; }, 2000);
        }

        window.onload = init;
    </script>
</body>
</html>
