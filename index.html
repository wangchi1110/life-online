<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>人生Online</title>
<style>
    body { background-color: #050A1F; color: #E0E0E0; font-family: 'Courier New', Courier, monospace; padding: 10px; margin: 0; font-size: 14px; }
    .panel { border: 1px solid #00FFFF; box-shadow: 0 0 8px rgba(0,255,255,0.2); border-radius: 5px; padding: 12px; margin-bottom: 15px; background-color: #0A1128; position: relative; }
    h2 { color: #00FFFF; font-size: 16px; margin-top: 0; border-bottom: 1px solid #00FFFF; padding-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; }
    
    .status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .neon-text { color: #00FFFF; font-weight: bold; }
    .tier-text { color: #FFD700; font-weight: bold; }
    
    .bar-bg { background-color: #1A2642; height: 10px; width: 100%; margin: 4px 0 10px 0; border-radius: 2px; overflow: hidden; }
    .bar-fill { height: 100%; width: 0%; transition: width 0.3s; }
    .bar-exp { background-color: #00FFFF; }
    .bar-hp { background-color: #FF3366; }
    .bar-mp { background-color: #33CCFF; }

    .attr-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 10px; }
    .attr-item { background-color: #111A3A; padding: 10px; border-radius: 4px; border-left: 3px solid #00FFFF; transition: all 0.5s; }
    .stagnant { filter: grayscale(100%); opacity: 0.5; border-left: 3px solid #555; }
    .attr-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px;}
    .attr-name { font-size: 14px; color: #8A9BB8; font-weight: bold;}
    .attr-val { font-size: 16px; color: #FFF; font-weight: bold; }

    .quality-row { display: flex; justify-content: space-between; align-items: center; background-color: #111A3A; padding: 6px 10px; margin-bottom: 5px; border-radius: 4px; }
    .quality-name { font-size: 13px; color: #A0C0FF; width: 80px;}
    .quality-controls { display: flex; align-items: center; gap: 10px; }
    .q-btn { background: #050A1F; color: #00FFFF; border: 1px solid #00FFFF; border-radius: 3px; width: 24px; height: 24px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0;}
    .q-btn:active { background: #00FFFF; color: #050A1F; }
    .q-val { font-size: 14px; color: #FFF; font-weight: bold; width: 30px; text-align: center; }

    .skill-section { margin-top: 10px; }
    .custom-item-header { display: flex; justify-content: space-between; align-items: center; margin-top: 6px;}
    .skill-name { color: #A0C0FF; font-size: 13px; }
    .cs-btn { background: transparent; border: 1px solid #4CAF50; color: #4CAF50; padding: 2px 8px; border-radius: 3px; font-size: 10px; cursor: pointer; margin-left: 5px;}
    .cs-del { border-color: #FF3366; color: #FF3366; }

    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .action-btn { background-color: #0A1128; color: #00FFFF; border: 1px solid #00FFFF; padding: 10px; border-radius: 3px; font-size: 12px; cursor: pointer; font-family: monospace; transition: all 0.2s; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;}
    .action-btn:active { background-color: #00FFFF; color: #050A1F; }
    .action-val { font-size: 10px; color: #8A9BB8; }
    .action-btn:active .action-val { color: #050A1F; }
    
    .edit-btn { background-color: #111A3A; color: #A0C0FF; border: 1px solid #A0C0FF; padding: 4px 8px; border-radius: 3px; font-size: 11px; cursor: pointer; }

    .log-box { font-size: 11px; color: #8A9BB8; height: 80px; overflow-y: auto; background-color: #030614; padding: 8px; border: 1px solid #1A2642; }
    
    #notification { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: #00FFFF; color: #000; padding: 10px 20px; border-radius: 5px; font-weight: bold; display: none; z-index: 100; }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; }
    .modal-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0A1128; border: 1px solid #00FFFF; padding: 20px; width: 85%; max-width: 320px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,255,255,0.3); }
    .modal-box input, .modal-box select { width: 100%; box-sizing: border-box; background: #050A1F; border: 1px solid #8A9BB8; color: #FFF; padding: 8px; margin-top: 5px; margin-bottom: 15px; font-family: monospace; }
</style>
</head>
<body>
    <div id="notification">SYSTEM UPDATE</div>

    <div id="modal-config" class="modal-overlay">
        <div class="modal-box">
            <h2 style="border:none;">系統參數設定</h2>
            <label>職業/身分：</label>
            <input type="text" id="input-job" placeholder="例如：學生、工程師">
            <label>流動資產 (HKD)：</label>
            <input type="number" id="input-cash" placeholder="輸入數字">
            <div style="display: flex; gap: 10px;">
                <button class="action-btn" style="flex: 1;" onclick="window.saveConfig()">儲存</button>
                <button class="action-btn" style="flex: 1; border-color: #FF3366; color: #FF3366;" onclick="window.closeModal('modal-config')">取消</button>
            </div>
        </div>
    </div>

    <div id="modal-action" class="modal-overlay">
        <div class="modal-box">
            <h2 style="border:none;">新增自訂動作</h2>
            <label>按鈕名稱：</label>
            <input type="text" id="act-name" placeholder="例如：冥想、寫程式">
            <label>對應提升目標：</label>
            <select id="act-target"></select>
            <label>每次提升數值 (素質建議 0.2，技能建議 10-20)：</label>
            <input type="number" id="act-val" step="0.1" value="0.2">
            <div style="display: flex; gap: 10px;">
                <button class="action-btn" style="flex: 1;" onclick="window.saveCustomAction()">新增</button>
                <button class="action-btn" style="flex: 1; border-color: #FF3366; color: #FF3366;" onclick="window.closeModal('modal-action')">取消</button>
            </div>
        </div>
    </div>

    <div class="panel">
        <h2>STATUS WINDOW <button class="edit-btn" onclick="window.openModal('modal-config')">⚙️ 設定</button></h2>
        <div class="status-row"><span>職業: <span id="p-job" class="neon-text">載入中...</span></span></div>
        <div class="status-row"><span>等級: <span id="p-lv" class="neon-text">1</span> (<span id="p-tier" class="tier-text">初心者</span>)</span></div>
        <div class="bar-bg"><div id="p-exp" class="bar-fill bar-exp"></div></div>
        <div class="status-row"><span>CASH: <span class="neon-text">HKD <span id="v-cash">0</span></span></span></div>
    </div>

    <div class="panel">
        <h2>ATTRIBUTES (核心素質)</h2>
        <div class="attr-grid">
            <div class="attr-item" id="ui-STR">
                <div class="attr-header"><span class="attr-name">力量 (STR)</span><span class="attr-val"><span id="v-str">0</span> / 100</span></div>
                <div class="bar-bg" style="margin:0;"><div class="bar-fill" id="bar-str" style="width:0%"></div></div>
            </div>
            <div class="attr-item" id="ui-VIT">
                <div class="attr-header"><span class="attr-name">體質 (VIT)</span><span class="attr-val"><span id="v-vit">0</span> / 100</span></div>
                <div class="bar-bg" style="margin:0;"><div class="bar-fill" id="bar-vit" style="width:0%"></div></div>
            </div>
            <div class="attr-item" id="ui-AGI">
                <div class="attr-header"><span class="attr-name">敏捷 (AGI)</span><span class="attr-val"><span id="v-agi">0</span> / 100</span></div>
                <div class="bar-bg" style="margin:0;"><div class="bar-fill" id="bar-agi" style="width:0%"></div></div>
            </div>
            <div class="attr-item" id="ui-INT">
                <div class="attr-header"><span class="attr-name">智力 (INT)</span><span class="attr-val"><span id="v-int">0</span> / 100</span></div>
                <div class="bar-bg" style="margin:0;"><div class="bar-fill" id="bar-int" style="width:0%"></div></div>
            </div>
        </div>
    </div>

    <div class="panel">
        <h2>CORE QUALITIES (7大素質)</h2>
        <div id="qualities-container"></div>
    </div>

    <div class="panel">
        <h2>TALENTS (天賦) <button class="edit-btn" style="border-color:#4CAF50; color:#4CAF50;" onclick="window.promptAddItem('talent')">+ 新增天賦</button></h2>
        <div class="skill-section" id="talents-container"></div>
    </div>

    <div class="panel">
        <h2>SKILLS (技能) <button class="edit-btn" style="border-color:#4CAF50; color:#4CAF50;" onclick="window.promptAddItem('skill')">+ 新增技能</button></h2>
        <div class="skill-section" id="skills-container"></div>
    </div>

    <div class="panel">
        <h2>ACTION CONSOLE <button class="edit-btn" style="border-color:#FFD700; color:#FFD700;" onclick="window.openActionModal()">+ 自訂動作</button></h2>
        <div class="btn-grid" id="actions-container">
            </div>
    </div>

    <div class="panel">
        <h2>SYSTEM LOG</h2>
        <div class="log-box" id="sys-log"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgwyo2bWYjFAuX4zPg1LNpgbGQqDDOmnI",
            authDomain: "life-online-dac47.firebaseapp.com",
            projectId: "life-online-dac47",
            storageBucket: "life-online-dac47.firebasestorage.app",
            messagingSenderId: "1007736463039",
            appId: "1:1007736463039:web:64fb96caa559a3c7bb300a"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const dbPath = ref(database, 'saveData/mainProfile');

        const EXP_REQ = 100;
        const STAGNATION_MS = 7 * 24 * 60 * 60 * 1000;
        
        const qNames = { action: '行動力', willpower: '意志力', learning: '學習力', thinking: '思考力', emotion: '情緒控制力', communication: '溝通能力', insight: '洞察力' };
        const attrNames = { STR: '力量', VIT: '體質', AGI: '敏捷', INT: '智力' };
        
        let db = {
            player: { lv: 1, exp: 0, cash: 0, job: '未設定' },
            attr: {
                STR: { pts: 0, last: Date.now() },
                VIT: { pts: 0, last: Date.now() },
                AGI: { pts: 0, last: Date.now() },
                INT: { pts: 0, last: Date.now() }
            },
            qualities: { action: 0, willpower: 0, learning: 0, thinking: 0, emotion: 0, communication: 0, insight: 0 },
            talents: {},
            customSkills: {},
            customActions: {},
            logs: ["系統連線中..."]
        };

        async function init() {
            try {
                const snapshot = await get(dbPath);
                if (snapshot.exists()) {
                    let cloudData = snapshot.val();
                    if(!cloudData.qualities) cloudData.qualities = { action: 0, willpower: 0, learning: 0, thinking: 0, emotion: 0, communication: 0, insight: 0 };
                    if(!cloudData.talents) cloudData.talents = {};
                    if(!cloudData.customSkills) cloudData.customSkills = {};
                    if(!cloudData.customActions) cloudData.customActions = {};
                    
                    // 資料庫結構遷移處理 (舊 Lv 制轉新點數制)
                    if(cloudData.attr.STR.lv !== undefined) {
                        cloudData.attr = {
                            STR: { pts: 0, last: Date.now() }, VIT: { pts: 0, last: Date.now() },
                            AGI: { pts: 0, last: Date.now() }, INT: { pts: 0, last: Date.now() }
                        };
                        addLog("系統架構升級：已重置舊有素質為點數制。");
                    }
                    db = cloudData;
                    addLog("已載入雲端存檔。");
                } else {
                    addLog("建立全新雲端存檔。");
                    setupDefaultActions();
                    save();
                }
                updateUI();
            } catch (error) {
                addLog("資料庫連線失敗，請檢查網路。");
                updateUI();
            }
        }

        function setupDefaultActions() {
            db.customActions = {
                'act_1': { name: '做Gym', targetType: 'attr', targetId: 'STR', val: 0.2 },
                'act_2': { name: '做帶氧操練', targetType: 'attr', targetId: 'VIT', val: 0.2 },
                'act_3': { name: '跑步', targetType: 'attr', targetId: 'AGI', val: 0.2 },
                'act_4': { name: '睇書學習', targetType: 'attr', targetId: 'INT', val: 0.2 }
            };
        }

        window.openModal = function(id) {
            if(id === 'modal-config') {
                document.getElementById('input-job').value = db.player.job !== '未設定' ? db.player.job : '';
                document.getElementById('input-cash').value = db.player.cash;
            }
            document.getElementById(id).style.display = 'block';
        }

        window.closeModal = function(id) { document.getElementById(id).style.display = 'none'; }

        window.saveConfig = function() {
            db.player.job = document.getElementById('input-job').value || '未設定';
            db.player.cash = parseInt(document.getElementById('input-cash').value) || 0;
            addLog("系統參數已儲存。");
            save(); updateUI(); closeModal('modal-config'); showFX("SAVED");
        }

        window.openActionModal = function() {
            let select = document.getElementById('act-target');
            let options = '';
            // 載入 4大素質
            for(let key in attrNames) { options += `<option value="attr_${key}">素質: ${attrNames[key]}</option>`; }
            // 載入天賦
            for(let id in db.talents) { options += `<option value="talent_${id}">天賦: ${db.talents[id].name}</option>`; }
            // 載入技能
            for(let id in db.customSkills) { options += `<option value="skill_${id}">技能: ${db.customSkills[id].name}</option>`; }
            select.innerHTML = options;
            
            document.getElementById('act-name').value = '';
            document.getElementById('modal-action').style.display = 'block';
        }

        window.saveCustomAction = function() {
            let name = document.getElementById('act-name').value.trim();
            let targetRaw = document.getElementById('act-target').value;
            let val = parseFloat(document.getElementById('act-val').value);
            
            if(!name || !targetRaw || isNaN(val)) return alert("請填寫完整資訊");
            
            let parts = targetRaw.split('_');
            let type = parts[0];
            let targetId = parts[1];
            if(parts.length > 2) targetId = parts.slice(1).join('_'); // 處理包含底線的 ID
            
            let id = 'act_' + Date.now();
            db.customActions[id] = { name: name, targetType: type, targetId: targetId, val: val };
            addLog(`新增動作指令：【${name}】`);
            save(); updateUI(); closeModal('modal-action'); showFX("ACTION ADDED");
        }

        window.deleteAction = function(id, name, event) {
            event.stopPropagation();
            if(confirm(`確認刪除動作【${name}】？`)) {
                delete db.customActions[id];
                save(); updateUI();
            }
        }

        window.changeQuality = function(key, delta) {
            let val = db.qualities[key] || 0;
            val += delta;
            if(val < 0) val = 0; if(val > 10) val = 10;
            db.qualities[key] = val;
            save(); updateUI();
        }

        window.promptAddItem = function(
